---
layout: default
---

<div class="timeline">
  {% for post in site.posts %}
    <!-- Guardem els tags del post en un atribut text per al script JS de la barra lateral -->
    <div class="timeline-item" data-tags="{% for tag in post.tags %}{{ tag }} {% endfor %}">
        <div class="item-header">
            <span class="company"><a href="{{ post.url | relative_url }}">{{ post.title }}</a></span>
            <span class="date">{{ post.date | date: "%d/%m/%Y" }}</span>
        </div>
        <p class="summary-text">
            {{ post.excerpt | strip_html | truncatewords: 40 }}
        </p>
    </div>
  {% endfor %}
</div>
