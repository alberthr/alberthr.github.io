---
layout: default
title: "Inici"
---

<div class="about">
  <p>{{ site.description }}</p>
</div>

<div class="tags-filter-container">
  <span class="filter-label">Filtrar per:</span>
  <button class="tag-filter-btn active" onclick="filtrarTags('tots')">#tots</button>
  <button class="tag-filter-btn" onclick="filtrarTags('python')">#python</button>
  <button class="tag-filter-btn" onclick="filtrarTags('sql')">#sql</button>
  <button class="tag-filter-btn" onclick="filtrarTags('outliers')">#outliers</button>
  <button class="tag-filter-btn" onclick="filtrarTags('analitica-web')">#analitica-web</button>
</div>

<section class="posts-list">
  <h2>Anotacions i Recursos</h2>
  <ul id="llista-posts">
    {% for post in site.posts %}
      <li class="post-item" data-tags="{{ post.tags | join: ',' }}">
        <a href="{{ post.url | relative_url }}" class="post-link">{{ post.title }}</a>
        <div class="list-tags">
          {% for tag in post.tags %}
            <span class="tag-sm">#{{ tag }}</span>
          {% endfor %}
        </div>
      </li>
    {% endfor %}
  </ul>
</section>

<script>
function filtrarTags(tagSeleccionada) {
  // 1. Canviar l'estat visual dels botons
  document.querySelectorAll('.tag-filter-btn').forEach(btn => {
    btn.classList.remove('active');
    if(btn.textContent === '#' + tagSeleccionada || (tagSeleccionada === 'tots' && btn.textContent === '#tots')) {
      btn.classList.add('active');
    }
  });

  // 2. Filtrar els posts
  document.querySelectorAll('.post-item').forEach(post => {
    if (tagSeleccionada === 'tots') {
      post.style.display = 'block'; // Mostra tots
    } else {
      // Agafem les etiquetes del post i mirem si inclou la seleccionada
      const tagsDelPost = post.getAttribute('data-tags').split(',');
      if (tagsDelPost.includes(tagSeleccionada)) {
        post.style.display = 'block';
      } else {
        post.style.display = 'none'; // Amaga el post
      }
    }
  });

  // 3. EXPERIMENT D'ANALÍTICA: Enviem el clic a Google Analytics (GA4)
  if (typeof gtag === 'function') {
    gtag('event', 'filtrar_contingut', {
      'tag_seleccionada': tagSeleccionada
    });
  }
}
</script>
