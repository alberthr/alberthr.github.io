---
layout: default
title: "Inici"
---

<div class="about">
  <p>{{ site.description }}</p>
</div>

<section class="posts-list">
  <h2>Anotacions i Recursos</h2>
  <ul>
    {% for post in site.posts %}
      <li>
        <a href="{{ post.url | relative_url }}" class="post-link">{{ post.title }}</a>
        <div class="list-tags">
          {% for tag in post.tags %}
            <span class="tag-sm">#{{ tag }}</span>
          {% endfor %}
        </div>
      </li>
    {% endfor %}
  </ul>
</section>
