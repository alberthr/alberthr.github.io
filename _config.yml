title: "Quadern personal d'anàlisi"
description: "Notes tècniques d'anàlisi de dades: estadística aplicada, modelització publicitària i programació amb R, Python, SQL i Power BI, escrites per no oblidar-les."
lang: ca
url: "https://alberthr.github.io" # URL final del site
baseurl: ""

image: /assets/images/og-default.png

twitter:
  card: summary_large_image

markdown: kramdown
kramdown:
  input: GFM
  math_engine: mathjax
  syntax_highlighter: rouge

permalink: /entrades/:title/

collections:
  posts:
    output: true

defaults:
  - scope:
      path: ""
      type: "posts"
    values:
      layout: "post"
  - scope:
      path: ""
      type: "pages"
    values:
      layout: "page"

plugins:
  - jekyll-feed
  - jekyll-sitemap
  - jekyll-seo-tag

exclude:
  - README.md
  - Gemfile
  - Gemfile.lock
