<!-- ===================================================================
     CALCULADORA DE MIDA DE MOSTRA — widget autònom per a Jekyll/GitHub Pages
     Només cal enganxar aquest bloc sencer (HTML+CSS+JS) dins del fitxer
     .md del post. Jekyll/kramdown deixa passar HTML brut sense problemes.
     Tot va escopat sota .cmostra-* per no col·lidir amb l'estil del blog.
     =================================================================== -->
<div class="cmostra-widget">
  <style>
    .cmostra-widget {
      --cm-bg: var(--card-bg, #fafafa);
      --cm-border: var(--border-color, #ddd);
      --cm-text: var(--text-color, #222);
      --cm-muted: #6b7280;
      --cm-accent: #b45309;
      --cm-accent-soft: #fde9d2;
      --cm-mono: "SFMono-Regular", Consolas, "Liberation Mono", Menlo, monospace;
      box-sizing: border-box;
      max-width: 640px;
      margin: 2rem 0;
      padding: 1.25rem 1.5rem 1.5rem;
      border: 1px solid var(--cm-border);
      border-radius: 10px;
      background: var(--cm-bg);
      color: var(--cm-text);
      font-family: inherit;
      font-size: 0.95rem;
    }
    .cmostra-widget * { box-sizing: border-box; }
    .cmostra-widget h4 {
      margin: 0 0 0.9rem;
      font-size: 0.78rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--cm-muted);
      font-weight: 600;
    }
    .cmostra-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 0.9rem 1rem;
    }
    .cmostra-field { display: flex; flex-direction: column; gap: 0.3rem; }
    .cmostra-field label { font-size: 0.82rem; color: var(--cm-muted); }
    .cmostra-field label .cmostra-formula { font-family: var(--cm-mono); font-style: normal; }
    .cmostra-field input, .cmostra-field select {
      font: inherit;
      font-family: var(--cm-mono);
      padding: 0.45rem 0.55rem;
      border: 1px solid var(--cm-border);
      border-radius: 6px;
      background: #fff;
      color: var(--cm-text);
      width: 100%;
    }
    .cmostra-field input:focus, .cmostra-field select:focus {
      outline: 2px solid var(--cm-accent);
      outline-offset: 1px;
    }
    .cmostra-hint { grid-column: 1 / -1; font-size: 0.78rem; color: var(--cm-muted); margin-top: -0.4rem; }
    .cmostra-result {
      margin-top: 1.1rem;
      display: flex;
      align-items: stretch;
      gap: 1rem;
      flex-wrap: wrap;
    }
    .cmostra-n {
      flex: 0 0 auto;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      padding: 0.6rem 1.1rem;
      border-radius: 8px;
      background: var(--cm-accent-soft);
      min-width: 110px;
    }
    .cmostra-n .num { font-family: var(--cm-mono); font-size: 1.9rem; font-weight: 700; color: var(--cm-accent); line-height: 1; }
    .cmostra-n .lab { font-size: 0.72rem; color: var(--cm-muted); margin-top: 0.25rem; text-transform: uppercase; letter-spacing: 0.05em; }
    .cmostra-bar-wrap { flex: 1 1 200px; display: flex; flex-direction: column; justify-content: center; gap: 0.35rem; min-width: 180px; }
    .cmostra-bar-row { display: flex; align-items: center; gap: 0.5rem; font-size: 0.78rem; color: var(--cm-muted); }
    .cmostra-bar-track { flex: 1; height: 8px; border-radius: 4px; background: #eee; overflow: hidden; }
    .cmostra-bar-fill { height: 100%; border-radius: 4px; background: var(--cm-accent); transition: width 0.25s ease; }
    .cmostra-bar-fill.alt { background: #94a3b8; }
    .cmostra-bar-val { font-family: var(--cm-mono); width: 4.5em; text-align: right; }
    .cmostra-note { margin-top: 0.9rem; font-size: 0.78rem; color: var(--cm-muted); line-height: 1.4; }
  </style>

  <h4>Calculadora de mida de mostra</h4>

  <div class="cmostra-grid">
    <div class="cmostra-field">
      <label for="cm-conf">Nivell de confiança</label>
      <select id="cm-conf">
        <option value="1.645">90%</option>
        <option value="1.96" selected>95%</option>
        <option value="2.576">99%</option>
      </select>
    </div>

    <div class="cmostra-field">
      <label for="cm-e">Marge d'error (e), %</label>
      <input id="cm-e" type="number" min="0.1" max="50" step="0.1" value="5">
    </div>

    <div class="cmostra-field">
      <label for="cm-p">Proporció esperada (p)</label>
      <input id="cm-p" type="number" min="0.01" max="0.99" step="0.01" value="0.5">
    </div>

    <div class="cmostra-field">
      <label for="cm-N">Mida de la població (N)</label>
      <input id="cm-N" type="number" min="1" step="1" placeholder="buit = infinita">
    </div>

    <div class="cmostra-hint">Si no coneixes p, deixa 0,5 (és l'opció més conservadora: maximitza n).</div>
  </div>

  <div class="cmostra-result">
    <div class="cmostra-n">
      <span class="num" id="cm-out-n">—</span>
      <span class="lab">mostra necessària</span>
    </div>
    <div class="cmostra-bar-wrap">
      <div class="cmostra-bar-row">
        <span style="width:5.5em">n&#8320; (infinita)</span>
        <div class="cmostra-bar-track"><div class="cmostra-bar-fill alt" id="cm-bar-n0" style="width:0%"></div></div>
        <span class="cmostra-bar-val" id="cm-val-n0">—</span>
      </div>
      <div class="cmostra-bar-row">
        <span style="width:5.5em">n (amb FPC)</span>
        <div class="cmostra-bar-track"><div class="cmostra-bar-fill" id="cm-bar-n" style="width:0%"></div></div>
        <span class="cmostra-bar-val" id="cm-val-n">—</span>
      </div>
    </div>
  </div>

  <div class="cmostra-note" id="cm-note"></div>

  <script>
  (function () {
    var $ = function (id) { return document.getElementById(id); };
    var elConf = $('cm-conf'), elE = $('cm-e'), elP = $('cm-p'), elN = $('cm-N');
    var outN = $('cm-out-n'), barN0 = $('cm-bar-n0'), barN = $('cm-bar-n'),
        valN0 = $('cm-val-n0'), valN = $('cm-val-n'), note = $('cm-note');

    function calc() {
      var z = parseFloat(elConf.value);
      var ePct = parseFloat(elE.value);
      var p = parseFloat(elP.value);
      var N = parseFloat(elN.value);

      if (!isFinite(z) || !isFinite(ePct) || !isFinite(p) || ePct <= 0 || p <= 0 || p >= 1) {
        outN.textContent = '—';
        note.textContent = 'Revisa els valors introduïts.';
        return;
      }

      var e = ePct / 100;
      var n0 = (z * z * p * (1 - p)) / (e * e);

      var n = n0;
      var usedFPC = false;
      if (isFinite(N) && N > 0) {
        n = n0 / (1 + (n0 - 1) / N);
        usedFPC = true;
      }

      var n0r = Math.ceil(n0);
      var nr = Math.ceil(n);

      outN.textContent = nr;
      valN0.textContent = n0r;
      valN.textContent = nr;

      var maxBar = Math.max(n0r, nr, 1);
      barN0.style.width = (100 * n0r / maxBar) + '%';
      barN.style.width = (100 * nr / maxBar) + '%';

      note.innerHTML = usedFPC
        ? 'n&#8320; = z²·p·(1-p) / e² = ' + n0.toFixed(1) + '. Amb correcció per població finita (N = ' + N + '): n = n&#8320; / (1 + (n&#8320;-1)/N) → <strong>' + nr + '</strong> individus.'
        : 'n&#8320; = z²·p·(1-p) / e² → <strong>' + nr + '</strong> individus (població infinita o desconeguda).';
    }

    [elConf, elE, elP, elN].forEach(function (el) {
      el.addEventListener('input', calc);
      el.addEventListener('change', calc);
    });
    calc();
  })();
  </script>
</div>
