<!DOCTYPE html>
<html lang="ca">
<head>
	<script async src="https://www.googletagmanager.com/gtag/js?id=G-24FW05JLVP"></script>
	<script>
	  window.dataLayer = window.dataLayer || [];
	  function gtag(){dataLayer.push(arguments);}
	  gtag('js', new Date());

	  gtag('config', 'G-24FW05JLVP');
	</script>
</head>

<div class="cmostra-widget">
  <title>Calculadora de mida de mostra</title>
  <meta name="description" content="Calculadora de mida de mostra estadística per dissenyar estudis amb el nivell de confiança i marge d'error desitjats.">
  <style>
    .cmostra-widget {
      --cm-primary: var(--primary, #3b82f6);
      --cm-primary-light: var(--primary-light, #f1f5f9);
      --cm-dark: var(--dark, #1e293b);
      --cm-text: var(--text-main, #475569);
      --cm-text-light: var(--text-light, #64748b);
      --cm-card-bg: var(--card-bg, #ffffff);
      --cm-border: var(--border, #e2e8f0);
      --cm-font: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;

      box-sizing: border-box;
      max-width: 640px;
      margin: 2rem auto;
      background: var(--cm-card-bg);
      border: 1px solid var(--cm-border);
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.05);
      padding: 32px 36px;
      font-family: var(--cm-font);
      color: var(--cm-text);
      font-size: 13.5px;
      line-height: 1.5;
    }
    .cmostra-widget *, .cmostra-widget *::before, .cmostra-widget *::after { box-sizing: border-box; }

    .cmostra-widget .cmostra-title {
      font-size: 14px;
      font-weight: 600;
      color: var(--cm-dark);
      text-transform: uppercase;
      letter-spacing: 0.5px;
      border-bottom: 1px solid var(--cm-border);
      padding-bottom: 6px;
      margin-bottom: 22px;
    }

    .cmostra-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 18px 20px;
    }
    .cmostra-field { display: flex; flex-direction: column; gap: 6px; }
    .cmostra-field label { font-size: 12.5px; color: var(--cm-text-light); }
    .cmostra-field input, .cmostra-field select {
      font: inherit;
      font-family: var(--cm-font);
      padding: 9px 10px;
      border: 1px solid var(--cm-border);
      border-radius: 6px; /* Modificat de 0 a 6px */
      background: #fff;
      color: var(--cm-dark);
      width: 100%;
    }
    .cmostra-field input:focus, .cmostra-field select:focus {
      outline: none;
      border-color: var(--cm-primary);
      box-shadow: 0 0 0 2px rgba(59, 130, 246, 0.15);
    }
    .cmostra-hint { grid-column: 1 / -1; font-size: 12px; color: var(--cm-text-light); margin-top: -8px; }

    .cmostra-result {
      margin-top: 24px;
      background: var(--cm-primary-light);
      border-left: 3px solid var(--cm-primary);
      padding: 18px 20px;
      display: flex;
      align-items: center;
      gap: 24px;
      flex-wrap: wrap;
    }
    .cmostra-n { flex: 0 0 auto; display: flex; flex-direction: column; align-items: flex-start; }
    .cmostra-n .num { font-size: 28px; font-weight: 700; color: var(--cm-dark); line-height: 1; }
    .cmostra-n .lab { font-size: 11px; color: var(--cm-text-light); text-transform: uppercase; letter-spacing: 0.5px; margin-top: 4px; }

    .cmostra-bar-wrap { flex: 1 1 200px; display: flex; flex-direction: column; gap: 8px; min-width: 180px; }
    .cmostra-bar-row { display: flex; align-items: center; gap: 10px; font-size: 11.5px; color: var(--cm-text-light); }
    .cmostra-bar-row > span:first-child { width: 90px; flex: 0 0 auto; }
    .cmostra-bar-track { flex: 1; height: 6px; background: #fff; border: 1px solid var(--cm-border); overflow: hidden; }
    .cmostra-bar-fill { height: 100%; background: var(--cm-text-light); }
    .cmostra-bar-fill.is-final { background: var(--cm-primary); }
    .cmostra-bar-val { font-size: 12px; color: var(--cm-dark); font-weight: 600; width: 3.5em; text-align: right; }

    .cmostra-note { margin-top: 16px; font-size: 12.5px; color: var(--cm-text-light); }
    .cmostra-note strong { color: var(--cm-dark); }
  </style>

  <div class="cmostra-title">Calculadora de mida de mostra</div>

  <div class="cmostra-grid">
    <div class="cmostra-field">
      <label for="cm-conf">Nivell de confiança</label>
      <select id="cm-conf">
        <option value="1.645">90%</option>
        <option value="1.96" selected>95%</option>
        <option value="2.576">99%</option>
      </select>
    </div>

    <div class="cmostra-field">
      <label for="cm-e">Marge d'error (e), %</label>
      <input id="cm-e" type="number" min="0.1" max="50" step="0.1" value="5">
    </div>

    <div class="cmostra-field">
      <label for="cm-p">Proporció esperada (p)</label>
      <input id="cm-p" type="number" min="0.01" max="0.99" step="0.01" value="0.5">
    </div>

    <div class="cmostra-field">
      <label for="cm-N">Mida de la població (N)</label>
      <input id="cm-N" type="number" min="1" step="1" placeholder="buit = infinita">
    </div>

    <div class="cmostra-hint">Si no coneixes p, deixa 0,5 (és l'opció més conservadora: maximitza n).</div>
  </div>

  <div class="cmostra-result">
    <div class="cmostra-n">
      <span class="num" id="cm-out-n">—</span>
      <span class="lab">mostra necessària</span>
    </div>
    <div class="cmostra-bar-wrap">
      <div class="cmostra-bar-row">
        <span>n&#8320; (infinita)</span>
        <div class="cmostra-bar-track"><div class="cmostra-bar-fill" id="cm-bar-n0" style="width:0%"></div></div>
        <span class="cmostra-bar-val" id="cm-val-n0">—</span>
      </div>
      <div class="cmostra-bar-row">
        <span>n (amb FPC)</span>
        <div class="cmostra-bar-track"><div class="cmostra-bar-fill is-final" id="cm-bar-n" style="width:0%"></div></div>
        <span class="cmostra-bar-val" id="cm-val-n">—</span>
      </div>
    </div>
  </div>

  <div class="cmostra-note" id="cm-note"></div>

  <script>
  (function () {
    var $ = function (id) { return document.getElementById(id); };
    var elConf = $('cm-conf'), elE = $('cm-e'), elP = $('cm-p'), elN = $('cm-N');
    var outN = $('cm-out-n'), barN0 = $('cm-bar-n0'), barN = $('cm-bar-n'),
        valN0 = $('cm-val-n0'), valN = $('cm-val-n'), note = $('cm-note');

    function calc() {
      var z = parseFloat(elConf.value);
      var ePct = parseFloat(elE.value);
      var p = parseFloat(elP.value);
      var N = parseFloat(elN.value);

      if (!isFinite(z) || !isFinite(ePct) || !isFinite(p) || ePct <= 0 || p <= 0 || p >= 1) {
        outN.textContent = '—';
        note.textContent = 'Revisa els valors introduïts.';
        return;
      }

      var e = ePct / 100;
      var n0 = (z * z * p * (1 - p)) / (e * e);

      var n = n0;
      var usedFPC = false;
      if (isFinite(N) && N > 0) {
        n = n0 / (1 + (n0 - 1) / N);
        usedFPC = true;
      }

      var n0r = Math.ceil(n0);
      var nr = Math.ceil(n);

      outN.textContent = nr;
      valN0.textContent = n0r;
      valN.textContent = nr;

      var maxBar = Math.max(n0r, nr, 1);
      barN0.style.width = (100 * n0r / maxBar) + '%';
      barN.style.width = (100 * nr / maxBar) + '%';

      note.innerHTML = usedFPC
        ? 'n&#8320; = z²·p·(1-p) / e² = ' + n0.toFixed(1) + '. Amb correcció per població finita (N = ' + N + '): n = n&#8320; / (1 + (n&#8320;-1)/N) → <strong>' + nr + '</strong> individus.'
        : 'n&#8320; = z²·p·(1-p) / e² → <strong>' + nr + '</strong> individus (població infinita o desconeguda).';
    }

    [elConf, elE, elP, elN].forEach(function (el) {
      el.addEventListener('input', calc);
      el.addEventListener('change', calc);
    });
    calc();
  })();
  </script>
</div>
</html>
