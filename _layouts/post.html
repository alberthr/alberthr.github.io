---
layout: default
---
<article class="post-content">
  <h1>{{ page.title }}</h1>
  
  <div class="post-tags">
    {% for tag in page.tags %}
      <span class="tag">#{{ tag }}</span>
    {% endfor %}
  </div>

  <hr>

  {{ content }}
</article>

<p><a href="{{ '/' | relative_url }}">&larr; Tornar a l'inici</a></p>
