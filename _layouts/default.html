<!DOCTYPE html>
<html lang="ca">

{% include head.html %}
<body>

  <div class="site-container">

    <header class="site-header-card">
      <div class="site-header-row">
        <a href="{{ '/' | relative_url }}" class="site-brand">
          <span class="site-logo-mark">&Sigma;</span>
          <span class="site-title">{{ site.title }}</span>
        </a>

        <nav class="site-nav">
          <a class="site-nav-link" href="{{ '/calculadores/' | relative_url }}">Calculadores</a>
          <a class="site-nav-link" href="{{ '/cv/' | relative_url }}">CV</a>
        </nav>
      </div>

      <span class="site-tagline">{{ site.description }}</span>
    </header>

    <div class="page-shell">
      {{ content }}
    </div>

    {% include footer.html %}

  </div>

  <script src="{{ '/assets/js/search.js' | relative_url }}"></script>
</body>
</html>
