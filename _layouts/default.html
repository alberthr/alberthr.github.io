<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>{{ page.title }} | {{ site.title }}</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      padding: 0;
      background: #fafafa;
      color: #333;
    }
    header {
      border-bottom: 1px solid #ddd;
      padding: 1em;
      text-align: center;
    }
    header h1 {
      margin: 0;
      font-size: 1.8em;
    }
    nav {
      margin-top: 0.5em;
    }
    nav a {
      text-decoration: none;
      color: #555;
      margin: 0 10px;
      font-weight: bold;
    }
    nav a:hover {
      color: #000;
    }
    .content {
      padding: 2em;
      max-width: 700px;
      margin: 0 auto;
    }
    h2 {
      margin-top: 2em;
      font-size: 1.5em;
      border-bottom: 2px solid #eee;
      padding-bottom: 0.5em;
    }
    ul {
      list-style: none;
      padding-left: 0;
    }
    li {
      margin: 0.5em 0;
    }
    a {
      color: #0066cc;
    }
    a:hover {
      text-decoration: underline;
    }
    footer {
      margin-top: 3em;
      padding: 1em;
      text-align: center;
      border-top: 1px solid #ddd;
      font-size: 0.9em;
      color: #777;
    }
  </style>
</head>
<body>
  <header>
    <h1>{{ site.title }}</h1>
    <nav>
      <a href="{{ '/' | relative_url }}">Inicio</a>
    </nav>
  </header>
  <div class="content">
    {{ content }}
  </div>
  <footer>
    &copy; 2026 Tu Nombre. Todos los derechos reservados.
  </footer>
</body>
</html>
